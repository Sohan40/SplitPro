name: Build Android APK

on:
  push:
    branches:
      - main
    paths:
      - 'android/**'
      - 'src/**'
      - 'App.tsx'
      - 'package.json'
      - 'package-lock.json'
      - 'index.js'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Cache Metro Bundler
        uses: actions/cache@v4
        with:
          path: .metro-cache
          key: ${{ runner.os }}-metro-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-metro-

      - name: Install Dependencies
        run: npm ci

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode google-services.json
        run: |
          echo "$FIREBASE_GOOGLE_SERVICE_JSON" | base64 --decode > android/app/google-services.json
        env:
          FIREBASE_GOOGLE_SERVICE_JSON: ${{ secrets.FIREBASE_GOOGLE_SERVICE_JSON }}

      - name: Create assets folder
        run: mkdir -p android/app/src/main/assets

      - name: Grant Permission to gradlew
        run: chmod +x android/gradlew

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease --parallel --build-cache -x lintVitalRelease

      - name: Upload APK to Firebase App Distribution
        run: |
          npm install -g firebase-tools

          firebase appdistribution:distribute android/app/build/outputs/apk/release/app-release.apk --app "1:98378274298:android:f765fe916d1d0a57b98043" --groups "Flatmates" --release-notes "v1.0.5 (Build 6): Added Light/Dark/System appearance settings, migrated screens/components to theme-aware colors, and polished profile/settings navigation."
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_CI_TOKEN }}

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
