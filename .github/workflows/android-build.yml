name: Build Android APK

on:
  push:
    branches:
      - main
    paths:
      - 'android/**'
      - 'src/**'
      - 'App.tsx'
      - 'package.json'
      - 'package-lock.json'
      - 'index.js'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Cache Metro Bundler
        uses: actions/cache@v4
        with:
          path: .metro-cache
          key: ${{ runner.os }}-metro-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-metro-

      - name: Install Dependencies
        run: npm ci

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode google-services.json
        run: |
          echo "$FIREBASE_GOOGLE_SERVICE_JSON" | base64 --decode > android/app/google-services.json
        env:
          FIREBASE_GOOGLE_SERVICE_JSON: ${{ secrets.FIREBASE_GOOGLE_SERVICE_JSON }}

      - name: Prepare Android release signing
        run: |
          if [ -z "$ANDROID_UPLOAD_KEYSTORE_BASE64" ] || [ -z "$ANDROID_KEYSTORE_PASSWORD" ] || [ -z "$ANDROID_KEY_ALIAS" ] || [ -z "$ANDROID_KEY_PASSWORD" ]; then
            echo "::error::Missing required Android release signing secrets."
            exit 1
          fi

          printf '%s' "$ANDROID_UPLOAD_KEYSTORE_BASE64" | base64 --decode > android/app/upload-key.jks

          cat > android/keystore.properties <<EOF
          storeFile=app/upload-key.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

          chmod 600 android/app/upload-key.jks android/keystore.properties
        env:
          ANDROID_UPLOAD_KEYSTORE_BASE64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Create assets folder
        run: mkdir -p android/app/src/main/assets

      - name: Grant Permission to gradlew
        run: chmod +x android/gradlew

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease --parallel --build-cache -x lintVitalRelease

      - name: Upload APK to Firebase App Distribution
        run: |
          npm install -g firebase-tools

          firebase appdistribution:distribute android/app/build/outputs/apk/release/app-release.apk --app "${{ secrets.FIREBASE_APP_ID }}" --groups "Flatmates" --release-notes "v1.0.7 (Build 12): Refreshed auth, profile, and settings screens; added group-level currency selection; improved expenses, balances, and settle-up views; updated app icons; added AI Subscriptions."
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_CI_TOKEN }}

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
